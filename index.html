<!DOCTYPE html>

  <link rel="stylesheet" href="style.css" />
</head>

  <nav class="navbar">

    <ul class="nav-links">

      <li><a href="#footer">Contact</a></li>
    </ul>

  <!-- HERO -->
  <section class="hero">

  <!-- FOOTER -->

    <p>Email: contact@eventify.com</p>

  <script src="script.js"></script>
